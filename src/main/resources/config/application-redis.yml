# ===================================================================
#                     Redis 配置
# ===================================================================

# ------------------- Spring Boot 默认 Redis 配置 -------------------
spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 2000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# ------------------- 自定义 Redis 实例配置 -------------------
app:
  redis:
    # 邮件验证码专用 Redis 实例
    email:
      host: 127.0.0.1
      port: 6379
      database: 1
      timeout: 2000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
    # AI 聊天上下文专用 Redis 实例
    chat:
      host: 127.0.0.1
      port: 6379
      database: 2
      timeout: 2000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
